version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount drafts directory for persistence
      - ./drafts:/app/drafts
      # Mount config for API keys (create .bpui.toml with your keys)
      - ./.bpui.toml:/app/.bpui.toml:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Development service with hot reload
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./bpui:/app/bpui
      - ./drafts:/app/drafts
      - ./.bpui.toml:/app/.bpui.toml:ro
      - ./blueprints:/app/blueprints
      - ./presets:/app/presets
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "-m", "uvicorn", "bpui.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    profiles:
      - dev
