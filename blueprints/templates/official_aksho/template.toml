[template]
name = "Official Aksho"
version = "3.1"
description = "Official Aksho card template with the split eight-asset flow"

[[assets]]
name = "system_prompt"
required = true
depends_on = []
description = "System-level behavioral instructions"
blueprint_file = "assets/system_prompt.md"

[[assets]]
name = "char_basic_info"
required = true
depends_on = [
    "system_prompt",
]
description = "Foundational identity and core concept"
blueprint_file = "assets/char_basic_info.md"

[[assets]]
name = "char_physical"
required = true
depends_on = [
    "system_prompt",
    "char_basic_info",
]
description = "Physical design and sensory signature"
blueprint_file = "assets/char_physical.md"

[[assets]]
name = "char_clothing"
required = true
depends_on = [
    "system_prompt",
    "char_physical",
]
description = "Wardrobe, style, and presentation details"
blueprint_file = "assets/char_clothing.md"

[[assets]]
name = "char_personality"
required = true
depends_on = [
    "system_prompt",
    "char_clothing",
]
description = "Psychological behavior and interpersonal dynamics"
blueprint_file = "assets/char_personality.md"

[[assets]]
name = "char_background"
required = true
depends_on = [
    "system_prompt",
    "char_personality",
]
description = "History, coping patterns, and internal conflict"
blueprint_file = "assets/char_background.md"

[[assets]]
name = "post_history"
required = true
depends_on = [
    "system_prompt",
    "char_background",
]
description = "Conversation context and relationship state"
blueprint_file = "assets/post_history.md"

[[assets]]
name = "initial_message"
required = true
depends_on = [
    "system_prompt",
    "post_history",
    "char_personality",
    "char_background",
]
description = "First interaction scenario"
blueprint_file = "assets/initial_message.md"
