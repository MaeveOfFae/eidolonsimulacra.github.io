# OpenRouter Preset Configuration
# This preset demonstrates using OpenRouter to access various AI models
# 
# Quick start:
# 1. Open the web app: pnpm dev:web
# 2. Configure your OpenRouter key in Settings or the browser-side config flow
# 3. Use this file as a reference preset if you are wiring TOML-driven config back into a runtime surface

[model]
# Select any OpenRouter model from https://openrouter.ai/models
# Examples:
# - openrouter/anthropic/claude-3-opus
# - openrouter/openai/gpt-4
# - openrouter/meta-llama/llama-3-70b-instruct
# - openrouter/deepseek/deepseek-chat
model = "openrouter/anthropic/claude-3-opus"

# Generation parameters
temperature = 0.7
max_tokens = 4096

# Engine configuration
engine_mode = "auto"  # Auto-detects OpenRouter and uses OpenAI-compatible API

[api_keys]
# Set your OpenRouter API key
# Store secrets outside version control; this file is a repository reference asset, not the browser runtime's active config store
# Or uncomment and set it here only for local experiments you do not commit
# openrouter = "sk-or-v1-..."

# Optional: Provider-specific keys for specific models
# These are only needed if you're using OpenRouter with specific provider keys
# openai = "sk-..."
# anthropic = "sk-ant-..."
# google = "AIzaSy..."

[batch]
# Batch processing settings
max_concurrent = 3
rate_limit_delay = 1.0

[output]
# Output configuration
format = "toml"
indent = 2

# Example model selection based on use case:
# 
# For creative writing:
#   model = "openrouter/anthropic/claude-3-opus"
#   temperature = 0.9
#   max_tokens = 8192
#
# For technical/factual content:
#   model = "openrouter/openai/gpt-4"
#   temperature = 0.3
#   max_tokens = 4096
#
# For fast responses:
#   model = "openrouter/openai/gpt-3.5-turbo"
#   temperature = 0.7
#   max_tokens = 2048
#
# For budget-conscious generation:
#   model = "openrouter/meta-llama/llama-3-70b-instruct"
#   temperature = 0.7
#   max_tokens = 4096